<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pachi Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="media/logo.pachi.png" alt="Logo Pachi" class="logo">
        
        <div class="social-buttons">
            <a href="https://www.tiktok.com/@pachi.store.peru" target="_blank" class="social-btn tiktok" title="TikTok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://www.facebook.com/pachi.store.peru" target="_blank" class="social-btn facebook" title="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://www.instagram.com/pachi.store.peru" target="_blank" class="social-btn instagram" title="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>
</body>
</html>
