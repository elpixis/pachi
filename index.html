<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pachi Store</title>
    <meta name="description" content="Pachi Store Perú - Moda y accesorios con estilo. Encuéntranos en TikTok, Facebook e Instagram.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="media/favicon.png" sizes="32x32">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="container">
        <h2 class="brand-phrase typewriter">¿Bueno, bonito y barato?</h2>
        
        <img src="media/logo.pachi.png" alt="Logo de Pachi Store Perú" class="logo">
        
        <nav class="social-section">
            <a href="https://wa.me/51958277178" target="_blank" class="whatsapp-btn" title="Enviar mensaje por WhatsApp">
                <i class="fab fa-whatsapp"></i> Enviar mensaje
            </a>
        
            <div class="social-buttons">
                <a href="https://www.tiktok.com/@pachi.store.peru" target="_blank" class="social-btn tiktok" title="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>
                <a href="https://www.facebook.com/pachi.store.peru" target="_blank" class="social-btn facebook" title="Facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="https://www.instagram.com/pachi.store.peru" target="_blank" class="social-btn instagram" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </nav>

    </header>
</body>
</html>
