<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style>
        .social-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .social-button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .whatsapp-button {
            background-color: #25D366;
            color: white;
            font-size: 20px;
            padding: 15px 30px;
        }
        .tiktok-button {
            background-color: #69C9D0;
            color: white;
        }
        .facebook-button {
            background-color: #3b5998;
            color: white;
        }
        .instagram-button {
            background-color: #C13584;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Contact Us</h1>
    <div class="social-buttons">
        <button class="social-button tiktok-button">TikTok</button>
        <button class="social-button facebook-button">Facebook</button>
        <button class="social-button instagram-button">Instagram</button>
        <button class="social-button whatsapp-button">WhatsApp</button>
    </div>
</body>
</html>
